<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiverse Explorer | Search</title>
    <link rel="stylesheet" href="../css/main.css">
</head>
<body>
    <header class="main-header">
        <nav class="container nav-wrapper">
            <span class="logo">Multiverse <span>Explorer</span></span>
            <button id="logout-btn" class="btn-outline">Sign Out</button>
        </nav>
    </header>

    <main class="container">
        <section class="search-section">
            <div class="search-container">
                <input type="text" id="search-input" placeholder="Search characters (e.g. Rick, Morty, Beth)...">
                <button id="search-btn" class="btn-primary">Search</button>
            </div>
        </section>

        <div id="results-grid" class="results-grid">
            <p class="placeholder-text">Enter a name to start the exploration...</p>
        </div>
    </main>

    <script type="module" src="../js/search.js"></script>
</body>
</html>
